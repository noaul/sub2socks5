name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag_prefix:
        description: Release tag prefix
        required: false
        default: nightly
      release_name:
        description: Release display name
        required: false
        default: ""

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      package_zip: true

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          PREFIX="${{ github.event.inputs.release_tag_prefix }}"
          if [ -z "$PREFIX" ]; then
            PREFIX="nightly"
          fi
          TS="$(date -u +'%Y%m%d-%H%M%S')"
          TAG="${PREFIX}-${TS}-run${{ github.run_number }}"

          NAME_INPUT="${{ github.event.inputs.release_name }}"
          if [ -z "$NAME_INPUT" ]; then
            NAME="$TAG"
          else
            NAME="$NAME_INPUT ($TAG)"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect archives
        shell: bash
        run: |
          mkdir -p release-upload
          find release-assets -type f -name "*.zip" -exec cp {} release-upload/ \;
          ls -la release-upload

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          append_body: false
          make_latest: true
          generate_release_notes: false
          files: release-upload/*.zip
