<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>节点管理 - sub2socks5</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <header class="app-header">
      <div>
        <h1>节点管理</h1>
        <p class="page-subtitle">先导入节点，再组装策略；保存后首页会自动同步可用出口。</p>
      </div>
      <div class="header-actions">
        <button id="back-home" type="button" class="secondary-button">返回主页</button>
        <button id="save-nodes" type="button">保存节点配置</button>
      </div>
    </header>

    <section>
      <div class="section-heading">
        <div>
          <h2>工作区</h2>
          <p class="section-subtitle">节点组适合自动测速或故障转移；链式代理适合多跳转发。</p>
        </div>
      </div>
      <div id="node-status" class="status-bar is-idle" role="status" aria-live="polite">准备就绪</div>
    </section>

    <section>
      <div class="section-heading">
        <h2>节点组</h2>
        <div class="section-heading-actions">
          <button id="toggle-groups-section" type="button">收起</button>
          <button id="add-group" type="button">添加节点组</button>
        </div>
      </div>
      <div id="groups-section-body">
        <div id="groups" class="timeline"></div>
      </div>
    </section>

    <section>
      <div class="section-heading">
        <h2>链式代理</h2>
        <div class="section-heading-actions">
          <button id="toggle-chains-section" type="button">收起</button>
          <button id="add-chain" type="button">添加链式代理</button>
        </div>
      </div>
      <div id="chains-section-body">
        <div id="chains" class="timeline"></div>
      </div>
    </section>

    <section>
      <div class="section-heading">
        <h2>现有节点</h2>
        <div class="section-heading-actions">
          <button id="check-all-nodes" type="button" class="icon-button" title="刷新所有节点测速" aria-label="刷新所有节点测速">↻</button>
          <button id="open-node-editor" type="button">管理手动节点</button>
        </div>
      </div>
      <div id="available-node-list" class="node-pill-grid"></div>
    </section>
  </main>
  <script type="module" src="/nodes.js"></script>
</body>
</html>
