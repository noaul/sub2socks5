<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="pageTitle.nodes">节点 - sub2socks5</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header id="menu-bar" class="menu-bar"></header>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <aside id="sidebar" class="sidebar"></aside>
  <main class="page-content">
    <div class="page-header">
      <div>
        <h1 data-i18n="nodes.title">节点管理</h1>
        <p class="page-subtitle" data-i18n="nodes.subtitle">先导入节点，再组装策略；节点组负责自动测试或故障转移，链式代理负责多跳路径。</p>
      </div>
      <div class="page-actions">
        <button id="save-nodes" type="button" data-i18n="nodes.save">保存节点配置</button>
      </div>
    </div>

    <section class="page-section">
      <div class="section-heading">
        <div>
          <h2 data-i18n="nodes.workspace">工作区</h2>
          <p class="section-subtitle" data-i18n="nodes.workspaceSubtitle">节点组用于自动测试或故障转移；链式代理用于多跳路径。</p>
        </div>
      </div>
      <div id="node-status" class="status-bar is-idle" role="status" aria-live="polite" data-i18n="common.ready">准备就绪</div>
    </section>

    <section class="page-section">
      <div class="section-heading">
        <h2 data-i18n="nodes.groups">节点组</h2>
        <div class="section-heading-actions">
          <button id="toggle-groups-section" type="button" class="secondary-button" data-i18n="common.collapse">收起</button>
          <button id="add-group" type="button" data-i18n="nodes.addGroup">添加节点组</button>
        </div>
      </div>
      <div id="groups-section-body">
        <div id="groups" class="timeline"></div>
      </div>
    </section>

    <section class="page-section">
      <div class="section-heading">
        <h2 data-i18n="nodes.chains">链式代理</h2>
        <div class="section-heading-actions">
          <button id="toggle-chains-section" type="button" class="secondary-button" data-i18n="common.collapse">收起</button>
          <button id="add-chain" type="button" data-i18n="nodes.addChain">添加链式代理</button>
        </div>
      </div>
      <div id="chains-section-body">
        <div id="chains" class="timeline"></div>
      </div>
    </section>

    <section class="page-section">
      <div class="section-heading">
        <h2 data-i18n="nodes.availableNodes">可用节点</h2>
        <div class="section-heading-actions">
          <button id="check-all-nodes" type="button" class="icon-button" title="刷新所有节点测速" aria-label="刷新所有节点测速" data-i18n-title="nodes.checkAll" data-i18n-aria-label="nodes.checkAll">↻</button>
          <button id="open-node-editor" type="button" data-i18n="nodes.openEditor">管理手动节点</button>
        </div>
      </div>
      <div id="available-node-list" class="node-pill-grid"></div>
    </section>
  </main>
  <script type="module" src="/layout.js"></script>
  <script type="module" src="/nodes.js"></script>
</body>
</html>
