<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>节点编辑 - sub2socks5</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <section>
      <div class="section-heading">
        <h1>节点编辑</h1>
        <div class="section-heading-actions">
          <button id="back-nodes" type="button">返回节点管理</button>
          <button id="save-edit-nodes" type="button">保存节点配置</button>
        </div>
      </div>
      <div id="edit-node-status" class="status-bar is-idle">准备就绪</div>
    </section>

    <section class="split-layout">
      <div class="split-panel">
        <div class="section-heading">
          <h2>手动导入节点</h2>
        </div>

        <div class="tab-bar">
          <button id="node-import-tab-form" type="button" class="tab-button is-active">表单</button>
          <button id="node-import-tab-raw" type="button" class="tab-button">单行/json</button>
        </div>

        <div id="node-import-form-panel" class="tab-panel is-active">
          <div class="form-grid">
            <label>
              <span>协议</span>
              <select id="manual-form-type"></select>
            </label>
            <label>
              <span>节点名称</span>
              <input id="manual-form-tag" />
            </label>
            <label>
              <span>服务器地址</span>
              <input id="manual-form-server" />
            </label>
            <label>
              <span>端口</span>
              <input id="manual-form-port" type="number" min="1" max="65535" />
            </label>
          </div>
          <div id="manual-form-fields" class="form-grid" style="margin-top: 12px;"></div>
          <div class="section-heading-actions" style="margin-top: 12px;">
            <button id="add-manual-form-node" type="button">添加表单节点</button>
          </div>
        </div>

        <div id="node-import-raw-panel" class="tab-panel is-hidden">
          <textarea id="edit-manual-node-input" spellcheck="false" placeholder="支持 vless://、vmess://、trojan://、ss://、socks5:// 等单行节点，多行节点文本，或结构化 JSON。"></textarea>
          <div class="section-heading-actions" style="margin-top: 12px;">
            <button id="import-edit-manual-nodes" type="button">导入为手动节点</button>
          </div>
        </div>

        <div id="edit-manual-import-result" class="timeline"></div>
      </div>

      <div class="split-panel">
        <div class="section-heading">
          <h2>当前节点</h2>
        </div>
        <div id="edit-node-list" class="node-edit-list"></div>
      </div>
    </section>
  </main>
  <script type="module" src="/nodes-edit.js"></script>
</body>
</html>
