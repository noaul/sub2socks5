<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="pageTitle.nodesEdit">Node Editor - sub2socks5</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header id="menu-bar" class="menu-bar"></header>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <aside id="sidebar" class="sidebar"></aside>
  <main class="page-content">
    <div class="page-header">
      <h1 data-i18n="nodesEdit.title">Node Editor</h1>
      <div class="page-actions">
        <a href="/nodes.html" class="secondary-button" style="text-decoration:none;display:inline-flex;align-items:center;min-height:38px;padding:9px 13px;" data-i18n="nodesEdit.back">Back to Nodes</a>
        <button id="save-edit-nodes" type="button" data-i18n="nodesEdit.save">Save</button>
      </div>
    </div>

    <section class="page-section">
      <div id="edit-node-status" class="status-bar is-idle" role="status" aria-live="polite" data-i18n="common.ready">Ready</div>
    </section>

    <section class="page-section split-layout">
      <div class="split-panel">
        <div class="section-heading">
          <h2 data-i18n="nodesEdit.importManual">Import Manual Nodes</h2>
        </div>

        <div class="tab-bar">
          <button id="node-import-tab-form" type="button" class="tab-button is-active" data-i18n="nodesEdit.form">Form</button>
          <button id="node-import-tab-raw" type="button" class="tab-button" data-i18n="nodesEdit.rawJson">Raw / JSON</button>
        </div>

        <div id="node-import-form-panel" class="tab-panel is-active">
          <div class="form-grid">
            <label>
              <span data-i18n="nodesEdit.protocol">Protocol</span>
              <select id="manual-form-type"></select>
            </label>
            <label>
              <span data-i18n="nodesEdit.nodeName">Node Name</span>
              <input id="manual-form-tag" />
            </label>
            <label>
              <span data-i18n="nodesEdit.server">Server</span>
              <input id="manual-form-server" />
            </label>
            <label>
              <span data-i18n="nodesEdit.port">Port</span>
              <input id="manual-form-port" type="number" min="1" max="65535" />
            </label>
          </div>
          <div id="manual-form-fields" class="form-grid" style="margin-top: 12px;"></div>
          <div class="section-heading-actions" style="margin-top: 12px;">
            <button id="add-manual-form-node" type="button" data-i18n="nodesEdit.addNode">Add Node</button>
          </div>
        </div>

        <div id="node-import-raw-panel" class="tab-panel is-hidden">
          <textarea id="edit-manual-node-input" spellcheck="false" placeholder="Supports vless://, vmess://, trojan://, ss://, socks5:// etc." data-i18n-placeholder="nodesEdit.rawPlaceholder"></textarea>
          <div class="section-heading-actions" style="margin-top: 12px;">
            <button id="import-edit-manual-nodes" type="button" data-i18n="nodesEdit.importNodes">Import Nodes</button>
          </div>
        </div>

        <div id="edit-manual-import-result" class="timeline"></div>
      </div>

      <div class="split-panel">
        <div class="section-heading">
          <h2 data-i18n="nodesEdit.currentNodes">Current Nodes</h2>
        </div>
        <div id="edit-node-list" class="node-edit-list"></div>
      </div>
    </section>
  </main>
  <script type="module" src="/layout.js"></script>
  <script type="module" src="/nodes-edit.js"></script>
</body>
</html>
