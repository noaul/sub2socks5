<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Config - sub2socks5</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header id="menu-bar" class="menu-bar"></header>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <aside id="sidebar" class="sidebar"></aside>
  <main class="page-content">
    <div class="page-header">
      <div>
        <h1 data-i18n="config.title">Configuration</h1>
        <p class="page-subtitle" data-i18n="config.subtitle">Set the Web UI, DNS, subscription URLs, and SOCKS5 services. Each field includes a short filling guide.</p>
      </div>
      <div class="page-actions">
        <div id="editor-status" class="editor-status is-saved" data-i18n="config.saved">Saved</div>
        <div class="view-switch">
          <button id="switch-form" class="switch-button is-active" type="button" data-i18n="config.form">Form</button>
          <button id="switch-json" class="switch-button" type="button" data-i18n="config.json">JSON</button>
        </div>
        <button id="save-config" type="button" data-i18n="config.save">Save</button>
      </div>
    </div>
    <div id="status-bar" class="status-bar is-idle" role="status" aria-live="polite" data-i18n="config.loading">Loading...</div>

    <!-- Form view -->
    <div id="form-view" class="config-view">
      <section class="page-section">
        <div class="section-heading">
          <h2 data-i18n="config.basic">Basic Settings</h2>
        </div>
        <div class="form-grid form-grid-basic">
          <label>
            <span data-i18n="label.appHost">Web UI Host</span>
            <input id="field-app-host" type="text" />
            <small id="help-app-host" class="field-help" data-i18n="help.appHost">Use 127.0.0.1 for local-only access. Use 0.0.0.0 for LAN/VPS access, then restrict source IPs with a firewall.</small>
          </label>
          <label>
            <span data-i18n="label.appPort">Web UI Port</span>
            <input id="field-app-port" type="number" min="1" step="1" />
            <small id="help-app-port" class="field-help" data-i18n="help.appPort">Port for this Web UI. Default is 18080; after changing it, visit the new port.</small>
          </label>
          <label>
            <span data-i18n="label.appBinary">sing-box Binary Path</span>
            <input id="field-app-binary" type="text" />
            <small id="help-app-binary" class="field-help" data-i18n="help.appBinary">Path to the sing-box executable. If you download it from the Kernel page, the default usually works.</small>
          </label>
          <label>
            <span data-i18n="label.appLogLevel">Log Level</span>
            <select id="field-app-log-level">
              <option value="trace">trace</option>
              <option value="debug">debug</option>
              <option value="info">info</option>
              <option value="warn">warn</option>
              <option value="error">error</option>
              <option value="fatal">fatal</option>
              <option value="panic">panic</option>
            </select>
            <small id="help-app-log-level" class="field-help" data-i18n="help.appLogLevel">Use info for normal use, debug for troubleshooting. trace can generate many logs.</small>
          </label>
          <label class="form-row-3 checkbox-field">
            <span data-i18n="label.appAutoStart">Auto Start</span>
            <input id="field-app-auto-start" type="checkbox" />
            <small id="help-app-auto-start" class="field-help" data-i18n="help.appAutoStart">When enabled, the app refreshes subscriptions and starts sing-box on launch.</small>
          </label>
        </div>
      </section>

      <section class="page-section">
        <div class="section-heading">
          <h2 data-i18n="config.dns">DNS Settings</h2>
        </div>
        <div class="form-grid form-grid-basic">
          <label>
            <span data-i18n="label.dnsStrategy">DNS Strategy</span>
            <select id="field-dns-strategy">
              <option value="prefer_ipv4">prefer_ipv4</option>
              <option value="prefer_ipv6">prefer_ipv6</option>
              <option value="ipv4_only">ipv4_only</option>
              <option value="ipv6_only">ipv6_only</option>
            </select>
            <small id="help-dns-strategy" class="field-help" data-i18n="help.dnsStrategy">prefer_ipv4 works for most networks. Use prefer_ipv6 or ipv6_only only when you need IPv6.</small>
          </label>
          <label>
            <span data-i18n="label.dohServer">DoH Server</span>
            <select id="field-dns-remote-preset">
              <option value="google">https://dns.google/dns-query</option>
              <option value="cloudflare">https://cloudflare-dns.com/dns-query</option>
              <option value="custom">Custom</option>
            </select>
            <small id="help-dns-remote-preset" class="field-help" data-i18n="help.dnsRemotePreset">Choose a common DoH provider, or choose Custom and fill the URL below.</small>
          </label>
          <label id="field-dns-remote-url-wrap" class="form-row-custom">
            <span data-i18n="label.customDohUrl">Custom DoH URL</span>
            <input id="field-dns-remote-url" type="text" placeholder="https://1.1.1.1/dns-query" />
            <small id="help-dns-remote-url" class="field-help" data-i18n="help.dnsRemoteUrl">Enter the full HTTPS DoH URL, for example https://dns.google/dns-query.</small>
          </label>
          <label>
            <span data-i18n="label.bootstrapDns">Bootstrap DNS</span>
            <select id="field-dns-bootstrap-preset">
              <option value="1.1.1.1">1.1.1.1</option>
              <option value="8.8.8.8">8.8.8.8</option>
              <option value="223.5.5.5">223.5.5.5</option>
              <option value="custom">Custom</option>
            </select>
            <small id="help-dns-bootstrap-preset" class="field-help" data-i18n="help.dnsBootstrapPreset">DNS server used to resolve the DoH hostname. 223.5.5.5 can be useful on China-based VPS networks.</small>
          </label>
          <label id="field-dns-bootstrap-wrap" class="form-row-custom is-hidden">
            <span data-i18n="label.customBootstrapDns">Custom Bootstrap DNS</span>
            <input id="field-dns-bootstrap" type="text" placeholder="223.5.5.5" />
            <small id="help-dns-bootstrap" class="field-help" data-i18n="help.dnsBootstrap">Enter a plain IP address, for example 1.1.1.1 or 223.5.5.5.</small>
          </label>
          <label>
            <span data-i18n="label.routeFinal">Default Route Outbound</span>
            <select id="field-route-final"></select>
            <small id="help-route-final" class="field-help" data-i18n="help.routeFinal">Outbound used when no route rule matches. Usually choose proxy or a node group.</small>
          </label>
        </div>
      </section>

      <section class="page-section">
        <div class="section-heading">
          <h2 data-i18n="config.subscriptionUrls">Subscription URLs</h2>
          <button id="add-subscription-url" type="button" data-i18n="action.addUrl">+ Add URL</button>
        </div>
        <div id="subscription-urls" class="timeline"></div>
      </section>

      <section class="page-section">
        <div class="section-heading">
          <h2 data-i18n="config.socksServices">SOCKS5 Services</h2>
          <button id="add-socks-service" type="button" data-i18n="action.addService">+ Add Service</button>
        </div>
        <div id="socks-services" class="timeline"></div>
      </section>
    </div>

    <!-- JSON view -->
    <div id="json-view" class="config-view is-hidden">
      <textarea id="config-editor" spellcheck="false"></textarea>
    </div>

    <!-- Generated config -->
    <section class="page-section" style="margin-top: 24px;">
      <div class="section-heading">
        <h2 data-i18n="config.generated">Generated Config</h2>
        <div class="view-switch">
          <button id="switch-generated-form" class="switch-button is-active" type="button" data-i18n="config.summary">Summary</button>
          <button id="switch-generated-json" class="switch-button" type="button" data-i18n="config.json">JSON</button>
        </div>
      </div>
      <div id="generated-form-view" class="info-view">
        <div id="generated-form" class="kv-grid"></div>
      </div>
      <div id="generated-json-view" class="info-view is-hidden">
        <pre id="generated-json"></pre>
      </div>
    </section>
  </main>
  <script type="module" src="/layout.js"></script>
  <script type="module" src="/config.js"></script>
</body>
</html>
